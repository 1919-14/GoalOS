<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#030303" />
    <meta name="description" content="Goal Computing Labs — Pioneering GoalOS and Goal-Based Computing (GBC). Software that adapts to humans, not the other way around." />
    <meta property="og:title" content="Goal Computing Labs — GoalOS | Goal-Based Computing" />

    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Goal Computing Labs",
        "url": "https://goalcomputinglabs.page",
        "logo": "https://goalcomputinglabs.page",
        "knowsAbout": ["GoalOS", "Goal-Based Computing", "Operating Systems", "Adaptive Software"]
      }
      </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Goal Computing Labs",
        "url": "https://goalcomputinglabs.page"
      }
      </script>



  </head>
  <body>
    <noscript>
      <h1>Goal Computing Labs — GoalOS</h1>
      <p>Discover GoalOS, a next-generation goal-based computing environment. Join our preview version waitlist today.</p>
    </noscript>
    <div id="root">
      <!-- Skeleton loader shown while JS bundle loads -->
      <style>
        .sk-overlay { position:fixed; inset:0; z-index:9999; background:#030303; display:flex; flex-direction:column; }
        .sk-nav { height:64px; display:flex; align-items:center; gap:12px; padding:0 4rem; border-bottom:1px solid rgba(255,255,255,0.06); }
        .sk-logo { width:32px; height:32px; border-radius:8px; background:rgba(255,255,255,0.06); }
        .sk-nav-pill { width:60px; height:28px; border-radius:20px; background:rgba(255,255,255,0.04); }
        .sk-body { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:4rem; padding:0 4rem; align-items:center; max-width:1440px; margin:0 auto; width:100%; }
        .sk-left { display:flex; flex-direction:column; gap:16px; }
        .sk-label { width:160px; height:20px; border-radius:4px; background:rgba(37,99,235,0.12); }
        .sk-h1 { width:100%; height:100px; border-radius:8px; background:rgba(255,255,255,0.04); }
        .sk-line { width:90%; height:18px; border-radius:4px; background:rgba(255,255,255,0.04); }
        .sk-line.short { width:60%; }
        .sk-btns { display:flex; gap:12px; margin-top:8px; }
        .sk-btn { width:160px; height:42px; border-radius:8px; background:rgba(37,99,235,0.15); }
        .sk-btn2 { width:140px; height:42px; border-radius:8px; background:rgba(255,255,255,0.05); }
        .sk-right { display:flex; align-items:center; justify-content:center; }
        .sk-graph { width:460px; height:460px; border-radius:50%; background:radial-gradient(circle, rgba(37,99,235,0.06) 0%, transparent 70%); }
        @media (max-width:768px) {
          .sk-body { grid-template-columns:1fr; padding:0 1.25rem; gap:2rem; }
          .sk-right { display:none; }
          .sk-nav { padding:0 1.25rem; }
        }
        .sk-shimmer {
          background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.02) 75%);
          background-size: 200% 100%;
          animation: sk-shimmer 2s ease-in-out infinite;
        }
        @keyframes sk-shimmer {
          0%   { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }
      </style>
      <div class="sk-overlay">
        <div class="sk-nav">
          <div class="sk-logo sk-shimmer"></div>
          <div class="sk-nav-pill sk-shimmer"></div>
          <div class="sk-nav-pill sk-shimmer"></div>
          <div class="sk-nav-pill sk-shimmer"></div>
          <div class="sk-nav-pill sk-shimmer"></div>
        </div>
        <div class="sk-body">
          <div class="sk-left">
            <div class="sk-label sk-shimmer"></div>
            <div class="sk-h1 sk-shimmer"></div>
            <div class="sk-line sk-shimmer"></div>
            <div class="sk-line short sk-shimmer"></div>
            <div class="sk-line sk-shimmer"></div>
            <div class="sk-btns">
              <div class="sk-btn sk-shimmer"></div>
              <div class="sk-btn2 sk-shimmer"></div>
            </div>
          </div>
          <div class="sk-right">
            <div class="sk-graph sk-shimmer"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
